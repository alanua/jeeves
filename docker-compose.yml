services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jeeves
      POSTGRES_PASSWORD: jeeves
      POSTGRES_DB: jeeves
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeeves -d jeeves"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - DEFAULT_MODE=${DEFAULT_MODE}
      - ENABLE_CLOUD_FALLBACK=${ENABLE_CLOUD_FALLBACK}
      - MOCK_PROVIDER_ENABLED=${MOCK_PROVIDER_ENABLED}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL_DEFAULT=${OLLAMA_MODEL_DEFAULT}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_MODEL_DEFAULT=${OPENROUTER_MODEL_DEFAULT}
      - OPENROUTER_TIMEOUT_SECONDS=${OPENROUTER_TIMEOUT_SECONDS}
      - TOOL_SHELL_ENABLED=${TOOL_SHELL_ENABLED}
      - TOOL_FILESYSTEM_ENABLED=${TOOL_FILESYSTEM_ENABLED}
      - TOOL_HTTP_ENABLED=${TOOL_HTTP_ENABLED}
      - SELF_MODIFICATION_ENABLED=${SELF_MODIFICATION_ENABLED}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
